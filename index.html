<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>M.E. Maurício — Designer Gráfico Sénior</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #033E8C;
  --blue-mid: #0550B3;
  --blue-light: #EBF2FF;
  --gold: #F4AE02;
  --off-white: #F7F7F5;
  --text: #111111;
  --text-mid: #444444;
  --text-muted: #888888;
  --border: rgba(0,0,0,0.09);
  --radius: 12px;
  --radius-lg: 20px;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  font-size: 16px; color: var(--text);
  background: #fff; overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════
   NAV
   ══════════════════════════════════════ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 18px 5vw;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  transition: box-shadow 0.3s;
}
nav.scrolled { box-shadow: 0 2px 20px rgba(0,0,0,0.08); }

.nav-logo {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem;
  color: var(--blue); text-decoration: none; letter-spacing: -0.5px;
}
.nav-logo span { color: var(--gold); }
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a {
  font-size: 0.875rem; font-weight: 500; color: var(--text-mid);
  text-decoration: none; transition: color 0.2s;
}
.nav-links a:hover { color: var(--blue); }
.nav-cta {
  background: var(--blue); color: #fff !important;
  padding: 9px 20px; border-radius: 8px;
  transition: background 0.2s !important;
}
.nav-cta:hover { background: var(--blue-mid) !important; }
.nav-burger {
  display: none; background: none; border: none;
  cursor: pointer; font-size: 1.4rem; color: var(--text);
  padding: 4px 8px;
  -webkit-tap-highlight-color: transparent;
}

/* ══════════════════════════════════════
   MOBILE NAV
   ══════════════════════════════════════ */
.mobile-nav {
  display: none; position: fixed; inset: 0;
  background: rgba(3,62,140,0.98); z-index: 200;
  flex-direction: column; align-items: center; justify-content: center; gap: 2rem;
  touch-action: none; overscroll-behavior: contain;
}
.mobile-nav.open { display: flex; }
.mobile-nav a {
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.8rem;
  color: rgba(255,255,255,0.85); text-decoration: none; transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.mobile-nav a:hover, .mobile-nav a:active { color: var(--gold); }
.mobile-close {
  position: absolute; top: 20px; right: 24px;
  background: none; border: none; color: rgba(255,255,255,0.7);
  font-size: 2rem; cursor: pointer; padding: 8px;
  -webkit-tap-highlight-color: transparent;
}

/* ══════════════════════════════════════
   HERO
   ══════════════════════════════════════ */
.hero {
  min-height: 100vh; min-height: 100dvh;
  display: grid; grid-template-columns: 1fr 1fr;
  position: relative; overflow: hidden;
}

.hero-text-panel {
  background: var(--blue);
  display: flex; flex-direction: column; justify-content: center;
  padding: 140px 6vw 80px 8vw;
  position: relative; z-index: 1;
}
.hero-text-panel::after {
  content: ''; position: absolute;
  top: 0; right: -60px; bottom: 0; width: 120px;
  background: var(--blue);
  clip-path: polygon(0 0, 0% 100%, 100% 100%);
  z-index: 2;
}

.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(244,174,2,0.18); border: 1px solid rgba(244,174,2,0.35);
  color: var(--gold); font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 6px 14px; border-radius: 100px;
  margin-bottom: 1.75rem; width: fit-content;
}
.hero-eyebrow::before {
  content: ''; width: 6px; height: 6px;
  background: var(--gold); border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.4; transform:scale(0.7); }
}

.hero h1 {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: clamp(2.4rem, 4.5vw, 4.8rem);
  line-height: 1.04; color: #fff;
  letter-spacing: -0.03em; margin-bottom: 1.5rem;
}
.hero h1 em { font-style: normal; color: var(--gold); }

.hero-desc {
  font-size: 1rem; line-height: 1.75;
  color: rgba(255,255,255,0.68);
  max-width: 440px; margin-bottom: 2.5rem;
}
.hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }

.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--gold); color: #1a1000;
  padding: 14px 28px; border-radius: 10px;
  font-size: 0.95rem; font-weight: 600; text-decoration: none;
  transition: transform 0.25s, box-shadow 0.25s;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(244,174,2,0.45); }

.btn-outline {
  display: inline-flex; align-items: center; gap: 8px;
  background: transparent; color: rgba(255,255,255,0.8);
  padding: 14px 28px; border-radius: 10px;
  border: 1.5px solid rgba(255,255,255,0.25);
  font-size: 0.95rem; font-weight: 500; text-decoration: none;
  transition: border-color 0.2s, background 0.2s, transform 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn-outline:hover {
  border-color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.06);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex; gap: 2.5rem;
  margin-top: 3rem; padding-top: 2.5rem;
  border-top: 1px solid rgba(255,255,255,0.12);
}
.stat-num {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 2rem; color: #fff; line-height: 1; margin-bottom: 4px;
}
.stat-num span { color: var(--gold); }
.stat-label { font-size: 0.75rem; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.05em; }

/* ══════════════════════════════════════
   SLIDESHOW - CORRIGIDO
   ══════════════════════════════════════ */
.hero-photo-panel {
  position: relative; background: var(--blue); overflow: hidden;
  min-height: 400px;
}

.hero-slideshow {
  position: absolute; inset: 0;
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 2;
}
.hero-slide {
  position: absolute;
  bottom: 0; left: 50%; transform: translateX(-50%);
  height: 95%; width: auto;
  max-width: 90%;
  object-fit: contain; object-position: bottom center;
  opacity: 0;
  transition: opacity 0.9s ease, transform 0.9s ease;
  transform: translateX(-50%) scale(0.97);
  display: block; pointer-events: none;
  will-change: opacity, transform;
}
.hero-slide.active {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}

.hero-dots {
  position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; z-index: 3;
}
.hero-dot {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
.hero-dot::after {
  content: ''; width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.3);
  transition: background 0.3s, transform 0.3s;
  display: block;
}
.hero-dot.active::after {
  background: var(--gold);
  transform: scale(1.3);
}

.hero-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.7); width: 44px; height: 44px;
  border-radius: 50%; font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 3;
  transition: background 0.2s, color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.hero-arrow:hover { background: rgba(244,174,2,0.25); color: var(--gold); }
.hero-arrow-prev { left: 12px; }
.hero-arrow-next { right: 12px; }

.hero-name-badge {
  position: absolute; bottom: 3.5rem; right: 1.5rem;
  background: rgba(2, 30, 75, 0.82);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(244,174,2,0.3);
  border-radius: 14px; padding: 1rem 1.4rem; z-index: 4;
  max-width: calc(100% - 3rem);
}
.hb-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; color: #fff; line-height: 1.2; }
.hb-sub   { font-size: 0.72rem; color: var(--gold); letter-spacing: 0.07em; text-transform: uppercase; margin-top: 3px; }

.hero-photo-panel::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  z-index: 3;
}

/* ══════════════════════════════════════
   SECTION COMMONS
   ══════════════════════════════════════ */
section { padding: 96px 5vw; }
.section-inner { max-width: 1200px; margin: 0 auto; }

.section-label {
  display: inline-block; font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--blue); margin-bottom: 0.75rem;
}
.section-title {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: clamp(1.8rem, 3.5vw, 2.8rem);
  line-height: 1.1; color: var(--text);
  letter-spacing: -0.025em; margin-bottom: 1rem;
}
.section-subtitle {
  font-size: 1rem; line-height: 1.7;
  color: var(--text-muted); max-width: 560px; margin-bottom: 3rem;
}

.fade-in {
  opacity: 0; transform: translateY(28px);
  transition: opacity 0.65s ease, transform 0.65s ease;
}
.fade-in.visible { opacity: 1; transform: translateY(0); }

/* ══════════════════════════════════════
   SERVIÇOS
   ══════════════════════════════════════ */
.services { background: var(--off-white); }
.services-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1.5rem; margin-top: 2rem;
}
.service-card {
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 2rem;
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative; overflow: hidden;
}
.service-card::after {
  content: ''; position: absolute;
  bottom: 0; left: 0; right: 0; height: 3px;
  background: var(--gold);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.4s;
}
.service-card:hover { transform: translateY(-6px); box-shadow: 0 20px 48px rgba(3,62,140,0.12); }
.service-card:hover::after { transform: scaleX(1); }

.service-icon {
  width: 48px; height: 48px; background: var(--blue-light); border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1.25rem; font-size: 1.25rem; color: var(--blue);
  transition: transform 0.3s, background 0.3s;
}
.service-card:hover .service-icon {
  transform: scale(1.15) rotate(-5deg);
  background: var(--blue);
  color: #fff;
}
.service-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--text); margin-bottom: 0.6rem; }
.service-desc  { font-size: 0.875rem; line-height: 1.65; color: var(--text-muted); }

/* ══════════════════════════════════════
   SOBRE
   ══════════════════════════════════════ */
.about-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
.about-text p { font-size: 1rem; line-height: 1.75; color: var(--text-mid); margin-bottom: 1.2rem; }
.tools-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 1.5rem; }
.tool-tag {
  display: flex; align-items: center; gap: 7px;
  background: var(--blue-light); border: 1px solid rgba(3,62,140,0.15);
  color: var(--blue); font-size: 0.8rem; font-weight: 500;
  padding: 7px 14px; border-radius: 8px;
}
.tool-tag img { width: 18px; height: 18px; object-fit: contain; }

.about-card {
  background: var(--blue); color: #fff;
  border-radius: var(--radius-lg); padding: 2.5rem;
  position: relative; overflow: hidden;
}
.about-card::before {
  content: '"'; position: absolute; top: -20px; left: 20px;
  font-family: 'Syne', sans-serif; font-size: 8rem;
  color: rgba(244,174,2,0.2); font-weight: 800; line-height: 1;
}
.about-quote {
  font-size: 1.1rem; line-height: 1.65;
  color: rgba(255,255,255,0.9);
  position: relative; z-index: 1; margin-bottom: 1.5rem;
}
.about-card-author { display: flex; align-items: center; gap: 12px; }
.author-photo {
  width: 44px; height: 44px; border-radius: 50%;
  overflow: hidden; flex-shrink: 0;
  border: 2px solid rgba(244,174,2,0.5);
}
.author-photo img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
.author-name { font-weight: 600; font-size: 0.9rem; color: #fff; }
.author-role { font-size: 0.78rem; color: rgba(255,255,255,0.55); }
.exp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem; }
.exp-item {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px; padding: 1.2rem; text-align: center;
}
.exp-num  { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; color: var(--gold); line-height: 1; margin-bottom: 4px; }
.exp-label { font-size: 0.75rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.06em; }

/* ══════════════════════════════════════
   PORTFÓLIO
   ══════════════════════════════════════ */
.portfolio { background: #fff; }
.portfolio-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 2.5rem; }
.filter-btn {
  background: var(--off-white); border: 1px solid var(--border);
  color: var(--text-mid); font-size: 0.825rem; font-weight: 500;
  padding: 10px 18px; border-radius: 100px; cursor: pointer;
  transition: all 0.25s; font-family: 'Inter', sans-serif;
  -webkit-tap-highlight-color: transparent;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--blue); border-color: var(--blue); color: #fff;
}

.portfolio-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; }
.port-item {
  border-radius: var(--radius); overflow: hidden; position: relative;
  aspect-ratio: 4/3; cursor: pointer; background: var(--off-white);
  min-height: 0;
}
.port-item img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.5s ease; display: block;
}
.port-item:hover img { transform: scale(1.08); }
.port-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(3,62,140,0.92) 0%, rgba(3,62,140,0.4) 50%, transparent 100%);
  opacity: 0; transition: opacity 0.3s;
  display: flex; flex-direction: column; justify-content: flex-end; padding: 1.5rem;
}
@media (hover: none) { .port-overlay { opacity: 0.85; } }
.port-item:hover .port-overlay { opacity: 1; }
.port-overlay-title {
  font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: 0.95rem; color: #fff; margin-bottom: 4px;
}
.port-overlay-cat {
  font-size: 0.75rem; color: var(--gold); font-weight: 500;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.port-zoom {
  position: absolute; top: 12px; right: 12px;
  width: 36px; height: 36px; background: rgba(255,255,255,0.15);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 0.9rem;
  opacity: 0; transition: opacity 0.3s;
}
.port-item:hover .port-zoom { opacity: 1; }
@media (hover: none) { .port-zoom { opacity: 1; } }

.port-load-more { text-align: center; margin-top: 2.5rem; }
.btn-load {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--off-white); border: 1px solid var(--border);
  color: var(--text-mid); font-size: 0.9rem; font-weight: 500;
  padding: 12px 28px; border-radius: 10px; cursor: pointer;
  font-family: 'Inter', sans-serif; transition: all 0.25s;
  -webkit-tap-highlight-color: transparent;
}
.btn-load:hover { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }

/* ══════════════════════════════════════
   LIGHTBOX
   ══════════════════════════════════════ */
.lightbox {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(2,15,45,0.97);
  align-items: center; justify-content: center;
  padding: 2rem;
  padding-top: max(2rem, env(safe-area-inset-top));
  padding-bottom: max(2rem, env(safe-area-inset-bottom));
  padding-left: max(1rem, env(safe-area-inset-left));
  padding-right: max(1rem, env(safe-area-inset-right));
  touch-action: none; overscroll-behavior: contain;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 90vw; max-height: 75vh; max-height: 75dvh;
  border-radius: var(--radius); object-fit: contain; display: block;
}
.lb-close {
  position: absolute; top: 20px; right: 24px;
  background: rgba(255,255,255,0.08); border: none;
  color: rgba(255,255,255,0.7);
  font-size: 1.5rem; cursor: pointer;
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.lb-close:hover { color: var(--gold); }
.lb-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.1); border: none; color: #fff;
  width: 48px; height: 48px; border-radius: 50%; font-size: 1.2rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.lb-nav:hover { background: rgba(255,255,255,0.22); }
.lb-prev { left: 16px; }
.lb-next { right: 16px; }
.lb-counter {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.5); font-size: 0.8rem; letter-spacing: 0.05em; white-space: nowrap;
}
#lb-desc {
  display: none; position: absolute;
  bottom: 56px; left: 50%; transform: translateX(-50%);
  max-width: min(600px, 90vw);
  text-align: center; color: rgba(255,255,255,0.7);
  font-size: 0.82rem; line-height: 1.6;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  padding: 10px 20px; border-radius: 10px; white-space: pre-line;
}

/* ══════════════════════════════════════
   PROCESSO
   ══════════════════════════════════════ */
.processo { background: var(--off-white); }
.processo-steps {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1.5rem; margin-top: 2rem;
}
.step-card {
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 2rem 1.5rem; text-align: center;
}
.step-num {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--blue); color: #fff;
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem;
  display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem;
}
.step-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; color: var(--text); margin-bottom: 0.6rem; }
.step-desc  { font-size: 0.825rem; line-height: 1.6; color: var(--text-muted); }

/* ══════════════════════════════════════
   CONTACTO
   ══════════════════════════════════════ */
.contact { background: var(--blue); }
.contact-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: start; }
.contact .section-label { color: var(--gold); }
.contact .section-title { color: #fff; }
.contact .section-subtitle { color: rgba(255,255,255,0.65); }

.contact-info-list { list-style: none; }
.contact-info-list li {
  display: flex; align-items: flex-start; gap: 1rem;
  padding: 1.25rem 0; border-bottom: 1px solid rgba(255,255,255,0.08);
}
.contact-info-list li:last-child { border-bottom: none; }
.ci-icon {
  width: 40px; height: 40px; background: rgba(244,174,2,0.15); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--gold); font-size: 1rem; flex-shrink: 0;
}
.ci-label { font-size: 0.75rem; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
.ci-value { font-size: 0.925rem; color: rgba(255,255,255,0.88); font-weight: 500; text-decoration: none; transition: color 0.2s; }
.ci-value:hover { color: var(--gold); }

/* ── FORM ── */
.contact-form { display: flex; flex-direction: column; gap: 1rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 0.8rem; font-weight: 500; color: rgba(255,255,255,0.6); letter-spacing: 0.04em; text-transform: uppercase; }
.form-input, .form-textarea, .form-select {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px; padding: 12px 16px;
  font-size: 1rem; color: #fff; font-family: 'Inter', sans-serif;
  transition: border-color 0.2s, background 0.2s;
  outline: none; width: 100%;
  -webkit-appearance: none; appearance: none;
}
.form-input::placeholder, .form-textarea::placeholder { color: rgba(255,255,255,0.3); }
.form-input:focus, .form-textarea:focus, .form-select:focus {
  border-color: var(--gold);
  background: rgba(255,255,255,0.1);
}
.form-textarea { resize: vertical; min-height: 120px; }

.select-wrap { position: relative; }
.select-wrap::after {
  content: '\f107'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  color: rgba(255,255,255,0.5); pointer-events: none;
}
.form-select option { background: #033E8C; color: #fff; }

.btn-submit {
  background: var(--gold); color: #1a1000; border: none;
  padding: 14px 28px; border-radius: 10px;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  font-family: 'Inter', sans-serif;
  display: flex; align-items: center; gap: 8px;
  transition: transform 0.25s, box-shadow 0.25s;
  align-self: flex-start;
  -webkit-tap-highlight-color: transparent;
}
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(244,174,2,0.4); }

/* ══════════════════════════════════════
   FOOTER
   ══════════════════════════════════════ */
footer {
  background: #01224E; color: rgba(255,255,255,0.5);
  padding: 2.5rem 5vw;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 0.82rem; flex-wrap: wrap; gap: 1rem;
  padding-bottom: max(2.5rem, env(safe-area-inset-bottom));
}
.footer-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; color: rgba(255,255,255,0.85); text-decoration: none; }
.footer-logo span { color: var(--gold); }
.social-links { display: flex; gap: 1rem; }
.social-link {
  width: 40px; height: 40px; background: rgba(255,255,255,0.07); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.95rem;
  transition: background 0.25s, color 0.25s;
  -webkit-tap-highlight-color: transparent;
}
.social-link:hover { background: var(--gold); color: #1a1000; }
