<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>M.E. Maurício — Designer Gráfico Sénior</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #033E8C;
  --blue-mid: #0550B3;
  --blue-light: #EBF2FF;
  --gold: #F4AE02;
  --off-white: #F7F7F5;
  --text: #111111;
  --text-mid: #444444;
  --text-muted: #888888;
  --border: rgba(0,0,0,0.09);
  --radius: 12px;
  --radius-lg: 20px;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  font-size: 16px; color: var(--text);
  background: #fff; overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════
   CURSOR GLOW (desktop only)
   ══════════════════════════════════════ */
.cursor-glow {
  position: fixed; pointer-events: none; z-index: 9999;
  width: 320px; height: 320px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(244,174,2,0.07) 0%, transparent 70%);
  transform: translate(-50%, -50%);
  transition: opacity 0.3s;
  will-change: transform;
}
@media (hover: none) { .cursor-glow { display: none; } }

/* ══════════════════════════════════════
   NAV
   ══════════════════════════════════════ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 18px 5vw;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  transition: box-shadow 0.3s;
  animation: navDrop 0.6s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes navDrop {
  from { transform: translateY(-100%); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}
nav.scrolled { box-shadow: 0 2px 20px rgba(0,0,0,0.08); }

.nav-logo {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem;
  color: var(--blue); text-decoration: none; letter-spacing: -0.5px;
  transition: color 0.2s;
}
.nav-logo:hover { color: var(--blue-mid); }
.nav-logo span { color: var(--gold); }

.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a {
  font-size: 0.875rem; font-weight: 500; color: var(--text-mid);
  text-decoration: none; position: relative; padding-bottom: 2px;
  transition: color 0.2s;
}
.nav-links a:not(.nav-cta)::after {
  content: '';
  position: absolute; bottom: -2px; left: 0;
  width: 100%; height: 1.5px;
  background: var(--blue);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
}
.nav-links a:not(.nav-cta):hover::after { transform: scaleX(1); }
.nav-links a:hover { color: var(--blue); }

.nav-cta {
  background: var(--blue); color: #fff !important;
  padding: 9px 20px; border-radius: 8px;
  transition: background 0.2s, transform 0.2s, box-shadow 0.2s !important;
}
.nav-cta:hover {
  background: var(--blue-mid) !important;
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(3,62,140,0.35) !important;
}
.nav-burger {
  display: none; background: none; border: none;
  cursor: pointer; font-size: 1.4rem; color: var(--text);
  padding: 4px 8px;
  -webkit-tap-highlight-color: transparent;
}

/* ══════════════════════════════════════
   MOBILE NAV
   ══════════════════════════════════════ */
.mobile-nav {
  display: none; position: fixed; inset: 0;
  background: rgba(3,62,140,0.98); z-index: 200;
  flex-direction: column; align-items: center; justify-content: center; gap: 2rem;
  touch-action: none; overscroll-behavior: contain;
}
.mobile-nav.open { display: flex; }
.mobile-nav.open a { animation: mobileLink 0.45s cubic-bezier(0.22,1,0.36,1) both; }
.mobile-nav.open a:nth-child(2)  { animation-delay: 0.05s; }
.mobile-nav.open a:nth-child(3)  { animation-delay: 0.10s; }
.mobile-nav.open a:nth-child(4)  { animation-delay: 0.15s; }
.mobile-nav.open a:nth-child(5)  { animation-delay: 0.20s; }
.mobile-nav.open a:nth-child(6)  { animation-delay: 0.25s; }
@keyframes mobileLink {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.mobile-nav a {
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.8rem;
  color: rgba(255,255,255,0.85); text-decoration: none; transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.mobile-nav a:hover, .mobile-nav a:active { color: var(--gold); }
.mobile-close {
  position: absolute; top: 20px; right: 24px;
  background: none; border: none; color: rgba(255,255,255,0.7);
  font-size: 2rem; cursor: pointer; padding: 8px;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.2s, transform 0.2s;
}
.mobile-close:hover { color: var(--gold); transform: rotate(90deg); }

/* ══════════════════════════════════════
   HERO ENTRANCE ANIMATIONS
   ══════════════════════════════════════ */
@keyframes heroUp {
  from { opacity: 0; transform: translateY(32px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes heroFade {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.hero-eyebrow   { animation: heroUp   0.7s 0.3s  cubic-bezier(0.22,1,0.36,1) both; }
.hero h1        { animation: heroUp   0.8s 0.5s  cubic-bezier(0.22,1,0.36,1) both; }
.hero-desc      { animation: heroUp   0.7s 0.75s cubic-bezier(0.22,1,0.36,1) both; }
.hero-actions   { animation: heroUp   0.7s 0.9s  cubic-bezier(0.22,1,0.36,1) both; }
.hero-stats     { animation: heroFade 0.8s 1.1s  ease both; }
.hero-name-badge { animation: heroFade 1s 1.4s ease both; }

/* ══════════════════════════════════════
   HERO LAYOUT
   ══════════════════════════════════════ */
.hero {
  min-height: 100vh; min-height: 100dvh;
  display: grid; grid-template-columns: 1fr 1fr;
  position: relative; overflow: hidden;
}

.hero-text-panel {
  background: var(--blue);
  display: flex; flex-direction: column; justify-content: center;
  padding: 140px 6vw 80px 8vw;
  position: relative; z-index: 1;
}
.hero-text-panel::after {
  content: ''; position: absolute;
  top: 0; right: -60px; bottom: 0; width: 120px;
  background: var(--blue);
  clip-path: polygon(0 0, 0% 100%, 100% 100%);
  z-index: 2;
  animation: wedgeIn 1s 0.2s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes wedgeIn {
  from { clip-path: polygon(0 0, 0% 100%, 0% 100%); }
  to   { clip-path: polygon(0 0, 0% 100%, 100% 100%); }
}

.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(244,174,2,0.18); border: 1px solid rgba(244,174,2,0.35);
  color: var(--gold); font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 6px 14px; border-radius: 100px;
  margin-bottom: 1.75rem; width: fit-content;
}
.hero-eyebrow::before {
  content: ''; width: 6px; height: 6px;
  background: var(--gold); border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.4; transform:scale(0.7); }
}

.hero h1 {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: clamp(2.4rem, 4.5vw, 4.8rem);
  line-height: 1.04; color: #fff;
  letter-spacing: -0.03em; margin-bottom: 1.5rem;
}
.hero h1 em { font-style: normal; color: var(--gold); position: relative; display: inline-block; }
.hero h1 em::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--gold), #fff8, var(--gold));
  background-size: 200% 100%;
  border-radius: 2px;
  animation: shimmer 3s 1.5s linear infinite;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.hero-desc {
  font-size: 1rem; line-height: 1.75;
  color: rgba(255,255,255,0.68);
  max-width: 440px; margin-bottom: 2.5rem;
}
.hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }

.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--gold); color: #1a1000;
  padding: 14px 28px; border-radius: 10px;
  font-size: 0.95rem; font-weight: 600; text-decoration: none;
  transition: transform 0.25s, box-shadow 0.25s;
  -webkit-tap-highlight-color: transparent;
  position: relative; overflow: hidden;
}
.btn-primary::before {
  content: '';
  position: absolute; top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transition: left 0.4s ease;
}
.btn-primary:hover::before { left: 160%; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(244,174,2,0.45); }

.btn-outline {
  display: inline-flex; align-items: center; gap: 8px;
  background: transparent; color: rgba(255,255,255,0.8);
  padding: 14px 28px; border-radius: 10px;
  border: 1.5px solid rgba(255,255,255,0.25);
  font-size: 0.95rem; font-weight: 500; text-decoration: none;
  transition: border-color 0.2s, background 0.2s, transform 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn-outline:hover {
  border-color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.06);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex; gap: 2.5rem;
  margin-top: 3rem; padding-top: 2.5rem;
  border-top: 1px solid rgba(255,255,255,0.12);
}
.stat-num {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 2rem; color: #fff; line-height: 1; margin-bottom: 4px;
}
.stat-num span { color: var(--gold); }
.stat-label { font-size: 0.75rem; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.05em; }

/* ══════════════════════════════════════
   HERO PHOTO PANEL - SLIDESHOW FIX
   ══════════════════════════════════════ */
.hero-photo-panel {
  position: relative; background: var(--blue); overflow: hidden;
  min-height: 400px;
}
.hero-photo-panel::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, #0550B3 0%, #033E8C 100%);
  opacity: 0.3;
  z-index: 0;
}

/* Fallback gradient slide */
.hero-slide-fallback {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 1;
  opacity: 0;
  transition: opacity 0.9s ease;
}
.hero-slide-fallback.active {
  opacity: 1;
}
.hero-slide-fallback .fallback-content {
  text-align: center; color: rgba(255,255,255,0.15);
  font-family: 'Syne', sans-serif;
  font-size: 6rem; font-weight: 800;
  letter-spacing: 0.1em;
}

.hero-slideshow {
  position: absolute; inset: 0;
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 2;
}
.hero-slide {
  position: absolute;
  bottom: 0; left: 50%; transform: translateX(-50%);
  height: 95%; width: auto;
  max-width: 90%;
  object-fit: contain; object-position: bottom center;
  opacity: 0;
  transition: opacity 0.9s ease, transform 0.9s ease;
  transform: translateX(-50%) scale(0.97);
  display: block; pointer-events: none;
  will-change: opacity, transform;
}
.hero-slide.active {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}
/* Fallback if image doesn't load */
.hero-slide.error {
  display: none;
}

.hero-dots {
  position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; z-index: 3;
}
.hero-dot {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
.hero-dot::after {
  content: ''; width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.3);
  transition: background 0.3s, transform 0.3s, width 0.3s;
  display: block;
}
.hero-dot.active::after {
  background: var(--gold);
  transform: scale(1.3);
  width: 20px; border-radius: 4px;
}

.hero-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.7); width: 44px; height: 44px;
  border-radius: 50%; font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 3;
  transition: background 0.2s, color 0.2s, transform 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.hero-arrow:hover { background: rgba(244,174,2,0.25); color: var(--gold); transform: translateY(-50%) scale(1.1); }
.hero-arrow:active { transform: translateY(-50%) scale(0.95); }
.hero-arrow-prev { left: 12px; }
.hero-arrow-next { right: 12px; }

.hero-name-badge {
  position: absolute; bottom: 3.5rem; right: 1.5rem;
  background: rgba(2, 30, 75, 0.82);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(244,174,2,0.3);
  border-radius: 14px; padding: 1rem 1.4rem; z-index: 4;
  max-width: calc(100% - 3rem);
  animation: badgeFloat 4s ease-in-out infinite;
}
@keyframes badgeFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}
.hb-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; color: #fff; line-height: 1.2; }
.hb-sub   { font-size: 0.72rem; color: var(--gold); letter-spacing: 0.07em; text-transform: uppercase; margin-top: 3px; }

.hero-photo-panel::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  z-index: 3;
  background-size: 200% 100%;
  animation: goldLine 4s linear infinite;
}
@keyframes goldLine {
  0%   { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* ══════════════════════════════════════
   SECTION COMMONS + REVEAL
   ══════════════════════════════════════ */
section { padding: 96px 5vw; }
.section-inner { max-width: 1200px; margin: 0 auto; }

.section-label {
  display: inline-block; font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--blue); margin-bottom: 0.75rem;
  position: relative;
}
.section-label::before {
  content: '';
  display: inline-block; width: 0; height: 2px;
  background: var(--gold); vertical-align: middle;
  margin-right: 0; border-radius: 1px;
  transition: width 0.5s cubic-bezier(0.22,1,0.36,1), margin-right 0.4s;
}
.section-label.visible::before { width: 20px; margin-right: 8px; }

.section-title {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: clamp(1.8rem, 3.5vw, 2.8rem);
  line-height: 1.1; color: var(--text);
  letter-spacing: -0.025em; margin-bottom: 1rem;
}
.section-subtitle {
  font-size: 1rem; line-height: 1.7;
  color: var(--text-muted); max-width: 560px; margin-bottom: 3rem;
}

.fade-in {
  opacity: 0; transform: translateY(28px);
  transition: opacity 0.65s ease, transform 0.65s ease;
}
.fade-in.visible { opacity: 1; transform: translateY(0); }

.fade-left  { opacity:0; transform:translateX(-28px); transition: opacity 0.65s ease, transform 0.65s ease; }
.fade-right { opacity:0; transform:translateX(28px);  transition: opacity 0.65s ease, transform 0.65s ease; }
.fade-left.visible, .fade-right.visible { opacity:1; transform:translateX(0); }

.fade-scale {
  opacity: 0; transform: translateY(20px) scale(0.97);
  transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.22,1,0.36,1);
}
.fade-scale.visible { opacity: 1; transform: translateY(0) scale(1); }

/* ══════════════════════════════════════
   SERVIÇOS
   ══════════════════════════════════════ */
.services { background: var(--off-white); }
.services-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1.5rem; margin-top: 2rem;
}
.service-card {
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 2rem;
  transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), box-shadow 0.3s;
  position: relative; overflow: hidden;
  cursor: default;
}
.service-card::after {
  content: ''; position: absolute;
  bottom: 0; left: 0; right: 0; height: 3px;
  background: var(--gold);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
}
.service-card:hover { transform: translateY(-6px); box-shadow: 0 20px 48px rgba(3,62,140,0.12); }
.service-card:hover::after { transform: scaleX(1); }
.service-icon {
  width: 48px; height: 48px; background: var(--blue-light); border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1.25rem; font-size: 1.25rem; color: var(--blue);
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), background 0.3s;
}
.service-card:hover .service-icon {
  transform: scale(1.15) rotate(-5deg);
  background: var(--blue);
  color: #fff;
}
.service-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--text); margin-bottom: 0.6rem; }
.service-desc  { font-size: 0.875rem; line-height: 1.65; color: var(--text-muted); }

/* ══════════════════════════════════════
   SOBRE
   ══════════════════════════════════════ */
.about-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
.about-text p { font-size: 1rem; line-height: 1.75; color: var(--text-mid); margin-bottom: 1.2rem; }
.tools-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 1.5rem; }
.tool-tag {
  display: flex; align-items: center; gap: 7px;
  background: var(--blue-light); border: 1px solid rgba(3,62,140,0.15);
  color: var(--blue); font-size: 0.8rem; font-weight: 500;
  padding: 7px 14px; border-radius: 8px;
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
  cursor: default;
}
.tool-tag:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 6px 18px rgba(3,62,140,0.15); }
.tool-tag img { width: 18px; height: 18px; object-fit: contain; }

.about-card {
  background: var(--blue); color: #fff;
  border-radius: var(--radius-lg); padding: 2.5rem;
  position: relative; overflow: hidden;
}
.about-card::before {
  content: '"'; position: absolute; top: -20px; left: 20px;
  font-family: 'Syne', sans-serif; font-size: 8rem;
  color: rgba(244,174,2,0.2); font-weight: 800; line-height: 1;
}
.about-card::after {
  content: ''; position: absolute;
  right: -40px; bottom: -40px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(5,80,179,0.6) 0%, transparent 70%);
  animation: glowPulse 5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes glowPulse {
  0%,100% { transform: scale(1); opacity: 0.7; }
  50%      { transform: scale(1.3); opacity: 1; }
}
.about-quote {
  font-size: 1.1rem; line-height: 1.65;
  color: rgba(255,255,255,0.9);
  position: relative; z-index: 1; margin-bottom: 1.5rem;
}
.about-card-author { display: flex; align-items: center; gap: 12px; position: relative; z-index: 1; }
.author-photo {
  width: 44px; height: 44px; border-radius: 50%;
  overflow: hidden; flex-shrink: 0;
  border: 2px solid rgba(244,174,2,0.5);
}
.author-photo img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
.author-name { font-weight: 600; font-size: 0.9rem; color: #fff; }
.author-role { font-size: 0.78rem; color: rgba(255,255,255,0.55); }
.exp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem; position: relative; z-index: 1; }
.exp-item {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px; padding: 1.2rem; text-align: center;
  transition: background 0.25s;
}
.exp-item:hover { background: rgba(255,255,255,0.12); }
.exp-num  { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; color: var(--gold); line-height: 1; margin-bottom: 4px; }
.exp-label { font-size: 0.75rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.06em; }

/* ══════════════════════════════════════
   PORTFÓLIO
   ══════════════════════════════════════ */
.portfolio { background: #fff; }
.portfolio-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 2.5rem; }
.filter-btn {
  background: var(--off-white); border: 1px solid var(--border);
  color: var(--text-mid); font-size: 0.825rem; font-weight: 500;
  padding: 10px 18px; border-radius: 100px; cursor: pointer;
  transition: all 0.25s; font-family: 'Inter', sans-serif;
  -webkit-tap-highlight-color: transparent;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--blue); border-color: var(--blue); color: #fff;
  transform: translateY(-1px); box-shadow: 0 4px 12px rgba(3,62,140,0.2);
}

.portfolio-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; }
.port-item {
  border-radius: var(--radius); overflow: hidden; position: relative;
  aspect-ratio: 4/3; cursor: pointer; background: var(--off-white);
  min-height: 0;
  transition: transform 0.35s cubic-bezier(0.22,1,0.36,1), box-shadow 0.35s;
}
.port-item:hover { transform: scale(1.03) translateY(-4px); box-shadow: 0 20px 48px rgba(0,0,0,0.18); z-index: 2; }
.port-item img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.5s ease; display: block;
}
.port-item:hover img { transform: scale(1.08); }
.port-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(3,62,140,0.92) 0%, rgba(3,62,140,0.4) 50%, transparent 100%);
  opacity: 0; transition: opacity 0.3s;
  display: flex; flex-direction: column; justify-content: flex-end; padding: 1.5rem;
}
@media (hover: none) { .port-overlay { opacity: 0.85; } }
.port-item:hover .port-overlay { opacity: 1; }
.port-overlay-title {
  font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: 0.95rem; color: #fff; margin-bottom: 4px;
  transform: translateY(6px); transition: transform 0.3s 0.05s;
}
.port-overlay-cat {
  font-size: 0.75rem; color: var(--gold); font-weight: 500;
  letter-spacing: 0.05em; text-transform: uppercase;
  transform: translateY(6px); transition: transform 0.3s 0.1s;
}
.port-item:hover .port-overlay-title,
.port-item:hover .port-overlay-cat { transform: translateY(0); }
.port-zoom {
  position: absolute; top: 12px; right: 12px;
  width: 36px; height: 36px; background: rgba(255,255,255,0.15);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 0.9rem;
  opacity: 0; transition: opacity 0.3s, transform 0.3s;
  transform: scale(0.8);
}
.port-item:hover .port-zoom { opacity: 1; transform: scale(1); }
@media (hover: none) { .port-zoom { opacity: 1; transform: scale(1); } }

.port-load-more { text-align: center; margin-top: 2.5rem; }
.btn-load {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--off-white); border: 1px solid var(--border);
  color: var(--text-mid); font-size: 0.9rem; font-weight: 500;
  padding: 12px 28px; border-radius: 10px; cursor: pointer;
  font-family: 'Inter', sans-serif; transition: all 0.25s;
  -webkit-tap-highlight-color: transparent;
}
.btn-load:hover
